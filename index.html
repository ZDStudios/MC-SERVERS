<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f0f0f0;
    }
    .box {
      text-align: center;
      background: white;
      padding: 2rem 3rem;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 4px solid #ddd;
      border-top-color: #555;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #444; margin: 0.4rem 0; }
    a { color: #0077cc; }
    .error { color: #c0392b; }
  </style>
</head>
<body>
  <div class="box" id="msg">
    <div class="spinner"></div>
    <p>Looking up redirect...</p>
  </div>

  <script>
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const key    = params.get("mc");
      const box    = document.getElementById("msg");

      // No mc= param at all — show a neutral message
      if (key === null) {
        box.innerHTML = "<p>No redirect key supplied.</p><p>Add <code>?mc=1</code> to the URL.</p>";
        return;
      }

      let map;
      try {
        const res = await fetch("mc.json");
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        map = await res.json();
      } catch (e) {
        box.innerHTML = `<p class="error">Could not load mc.json</p><p>${e.message}</p>`;
        return;
      }

      const target = map[key];

      if (!target) {
        box.innerHTML = `<p class="error">Unknown key: <strong>${key}</strong></p>
                         <p>Add it to <code>mc.json</code> and redeploy.</p>`;
        return;
      }

      // Show the destination briefly, then redirect
      box.innerHTML = `<div class="spinner"></div>
                       <p>Redirecting to</p>
                       <p><a href="${target}">${target}</a></p>`;
      window.location.replace(target);
    })();
  </script>
</body>
</html>
